version: '3.8'
services:
  frontend:
    build:
      context: .
      args:
        # Alamat BE Laravel Anda (sesuaikan jika nanti dideploy ke server)
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: vue-frontend
    ports:
      - "8080:80" # Akses web di http://localhost:8080
    restart: always